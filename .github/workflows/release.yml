name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: 태그와 tauri.conf.json 버전 일치 검사
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CONF=$(jq -r .version src-tauri/tauri.conf.json)
          if [ "$TAG" != "$CONF" ]; then
            echo "버전 불일치: 태그 v$TAG vs tauri.conf.json $CONF" >&2
            exit 1
          fi

  build:
    needs: version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            target: ""
    runs-on: ${{ matrix.platform }}
    env:
      # 윈도우 서명 스캐폴드(M6): 시크릿을 job env로 승격해야 step if:에서 존재 판정이 된다
      # (step-level env는 자기 if:에서 안 보이는 함정). 미등록이면 빈 문자열 → 서명 스텝 스킵 → 무서명 빌드(회귀 0).
      WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install
      - name: 공증 API 키 파일 복원 (맥 전용)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          echo "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/apple-api-key.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/apple-api-key.p8" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      # 윈도우 코드 서명 스캐폴드(M6): WINDOWS_SIGN_COMMAND 시크릿이 있을 때만 tauri.conf.json에
      # bundle.windows.signCommand를 주입한다(러너 작업본에만, 커밋 아님). 미등록이면 스텝 스킵 → 무서명 빌드 그대로.
      # 인증서 확보 시: `gh secret set WINDOWS_SIGN_COMMAND`(예: signtool 호출 또는 클라우드 서명 CLI, %1이 서명할 파일)
      # + 서명 도구가 읽을 크리덴셜을 아래 스텝 env에 추가. tauri-action은 tauri build만 호출하므로 서명은 config로 제어된다.
      - name: 윈도우 서명 구성 주입 (시크릿 있을 때만, 없으면 no-op)
        if: runner.os == 'Windows' && env.WINDOWS_SIGN_COMMAND != ''
        shell: bash
        run: |
          tmp=$(mktemp)
          jq --arg cmd "$WINDOWS_SIGN_COMMAND" \
            '.bundle.windows = ((.bundle.windows // {}) + {signCommand: $cmd})' \
            src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          echo "윈도우 서명 구성 주입됨 (signCommand)"
      - name: Tauri 빌드·서명·공증·draft 릴리스
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_PAT }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: YONG BEOM GWON (RB6FTGW2DK)"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          owner: needslab-ai
          repo: easy-harness-releases
          tagName: v__VERSION__
          releaseName: "이지 하네스 v__VERSION__"
          releaseBody: "새 버전이 나왔어요. 아래 파일로 설치할 수 있어요."
          releaseDraft: true
          # 릴리스 레포는 코드 히스토리가 달라 현재 커밋 SHA를 못 쓴다 - 릴리스 레포의 main 기준
          releaseCommitish: main
          args: ${{ matrix.args }}
      - name: 시크릿 스캔 (산출물, 발행 게이트 앞 안전망)
        shell: bash
        working-directory: src-tauri
        run: |
          BUNDLE_DIR="target/release/bundle"
          if [ -n "${{ matrix.target }}" ]; then
            BUNDLE_DIR="target/${{ matrix.target }}/release/bundle"
          fi
          cargo run --features dev-tools --bin scan_secrets -- "$BUNDLE_DIR"
